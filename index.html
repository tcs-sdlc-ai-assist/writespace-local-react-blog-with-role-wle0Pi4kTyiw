<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="writespace – a modern writing space built with React and Tailwind CSS" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>writespace</title>
    <!-- Tailwind CDN fallback for development or if build fails -->
    <script>
      if (!document.querySelector('style[tailwind]')) {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://cdn.jsdelivr.net/npm/tailwindcss@3.4.3/dist/tailwind.min.css';
        document.head.appendChild(link);
      }
    </script>
  </head>
  <body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
